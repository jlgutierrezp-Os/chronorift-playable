<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>ChronoRift C6B.1</title><style>
*{box-sizing:border-box}body{margin:0;background:#0b0f14;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif}.app{max-width:920px;margin:auto;padding:10px}.top{position:sticky;top:0;background:#0b0f14f2;border-bottom:1px solid #334155;padding:8px;z-index:4}.pill{display:inline-block;border:1px solid #334155;border-radius:999px;padding:5px 8px;margin:3px;color:#cbd5e1;font-size:12px}.card{background:#151b23;border:1px solid #334155;border-radius:18px;padding:14px;margin:10px 0}.ok{background:#10291a;border-color:#6ee7a2}.warn{background:#2a1f10;border-color:#fbbf24}button,input,textarea{font:inherit}button{min-height:44px;border:1px solid #475569;background:#202a36;color:#fff;border-radius:14px;padding:10px 12px;margin:4px;font-weight:800}.primary{background:#f8fafc;color:#0b0f14}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.small{color:#aeb9c8;font-size:13px}.term{white-space:pre-wrap;background:#0f151c;border:1px solid #303b49;border-radius:12px;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12px}.doll{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.doll button{min-height:58px}.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:none;background:#fff;color:#111;padding:10px 12px;border-radius:14px;font-weight:900}@media(max-width:700px){.grid,.doll{grid-template-columns:1fr}.app{padding:7px}}
</style></head><body><div class="app"><div class="top"><b>ChronoRift C6B.1 · Pos.Ayá Diegetic Clarity Fix</b><br><span class="small">ready_for_human_test · sin cuenta · sin pago · local-first</span><div><span class="pill">Modo <b id="m">RPG</b></span><span class="pill">Objetivo <b id="o">0/5</b></span><span class="pill">Coins <b id="c">0</b></span><span class="pill">Energía <b id="e">100</b></span><span class="pill">Paquetes <b id="p">0/3</b></span></div><button data-mode="rpg">RPG</button><button data-mode="active">Active/Comic</button><button data-mode="builder">Builder</button><button id="debug">SelfDebug</button><button id="copy">Copiar reporte</button></div><main id="view"></main></div><div id="toast" class="toast"></div><script>
(()=>{const $=q=>document.querySelector(q);let st={v:'C6B1',mode:'rpg',step:'intro',alias:'Human_01',items:{phone:0,chip:0,tape:0,sticks:0,flower:0},pos:0,book:0,box:0,route:0,repair:0,bridge:0,energy:100,coins:0,ship:0,won:0,log:[],review:''};try{let x=JSON.parse(localStorage.cr_c6b1||'null');if(x&&x.v==='C6B1')st=x}catch(e){};const names=['phone','chip','tape','sticks','flower'], item={phone:'📱 Phone: mundo exterior',chip:'▣ Chip/SIM: señal mínima',tape:'▤ Tape: reparar',sticks:'╱╲ Sticks: puente',flower:'🌱 Miniature Office Flower: energía'};function log(x){st.log.push(new Date().toLocaleTimeString()+' '+x);st.log=st.log.slice(-16)}function save(){localStorage.cr_c6b1=JSON.stringify(st)}function toast(x){let t=$('#toast');t.textContent=x;t.style.display='block';setTimeout(()=>t.style.display='none',1900)}function done(){return [st.box,st.book,st.pos,st.route&&st.repair&&st.bridge,st.won].filter(Boolean).length}function hdr(){ $('#m').textContent=st.mode;$('#o').textContent=done()+'/5';$('#c').textContent=st.coins;$('#e').textContent=st.energy;$('#p').textContent=st.ship+'/3'}function som(){return `${st.alias}-C6B1-${st.won?'WON':'OPEN'}-SHIP${st.ship}-E${st.energy}-C${st.coins}`.replace(/[^A-Za-z0-9_-]/g,'')}function esc(x){return String(x).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function b(txt,a,cl=''){return `<button class="${cl}" data-a="${a}">${txt}</button>`}function card(t,body,act=''){return `<section class="card"><h2>${t}</h2>${body}<div>${act}</div></section>`}function todo(){let r=[['box','Guarda Personal Belongings en Stuff Box'],['book','Abre Notebook / Somero'],['pos','Usa Pos.Ayá como objeto-menú'],['route','Repara, cruza y conecta ruta'],['won','Gana enviando 3 paquetes']];return card('Qué estoy haciendo / Cómo gano',r.map(([k,x])=>`<div class="card ${st[k]?'ok':''}">${st[k]?'✓':'□'} ${x}</div>`).join(''))}function render(){hdr();let h=todo();if(st.step==='intro')h+=card('🏢 THE CORPORATION PRESENTA',`<h1>ChronoRift: HUMAN in the LOOP</h1><p>${st.mode==='active'?'Objetivo: guarda ítems, usa Pos.Ayá, construye ruta, envía 3 paquetes y mira GANASTE.':'No necesitas saber cuánto dura un loop. Solo necesitas estar disponible. Esta versión deja claro qué hiciste y cuándo ganaste.'}</p>`,b('APLICAR A TRAINEE','app','primary')+b('OMITIR INTRO','active')+b('IR A BUILDER','builder'));if(st.step==='app')h+=card('FORMULARIO DE INGRESO',`<p>Nombre de uso dentro del Loop:</p><input id="alias" value="${esc(st.alias)}"><p class="small">Somero Trace no es cuenta ni contraseña. Es una marca para recordar dónde estabas.</p>`,b('GUARDAR','avatar','primary')+b('USAR HUMAN_01','human'));if(st.step==='avatar')h+=card('AVATAR TEMPORAL',`<p>La Corporation solo requiere una silueta suficientemente operativa.</p><div class="grid">${['👤 Trainee','◇ Operador geométrico','◉ Asistente humano'].map(x=>b(x,'av')).join('')}</div>`,b('CONTINUAR','items','primary'));if(st.step==='items')h+=card('PERSONAL BELONGINGS',`<p>Estos 5 ítems evitan cabos sueltos de historia:</p>${names.map(k=>`<div class="card ${st.items[k]?'ok':''}">${st.items[k]?'✓':'□'} ${item[k]} ${b(st.items[k]?'QUITAR':'GUARDAR','it:'+k)}</div>`).join('')}`,b('GUARDAR TODOS','all','primary')+b('IR A STUFF BOX','box'));if(st.step==='box')h+=card('📦 STUFF BOX',`<div class="term">${names.every(k=>st.items[k])?'Ítems completos':'Faltan ítems'}\nSomero: ${som()}\nAcceso: limitado por comodidad operativa.</div>`,b('REVISAR ÍTEMS','items')+b('CERRAR LOCKER','close','primary'));if(st.step==='hub')h+=card('CUBÍCULO DE TRAINEE',`<p>El cuarto contiene tus interfaces. Pos.Ayá no es menú flotante: es objeto dentro del mundo.</p>`,b('📓 Notebook / Somero','book')+b('💻 Laptop','mail')+b('🧸 Pos.Ayá','posaya','primary')+b('🌱 Micropausa','rest')+b('🧱 Builder','build')+b('⚠ Review','review'));if(st.step==='book'){st.book=1;h+=card('📓 NOTEBOOK / SOMERO',`<div class="term">Nombre: ${esc(st.alias)}\nRol: HUMAN in the LOOP / Trainee\nItems: ${names.every(k=>st.items[k])?'completos':'incompletos'}\nSomero Trace:\n${som()}\n\nLa Corporation registra desempeño. Somero recuerda contexto. No son lo mismo.</div>`,b('VOLVER','hub','primary'))}if(st.step==='mail')h+=card('💻 LAPTOP',`<div class="term">FROM: Supervisor Local\nPaso 1: Notebook.\nPaso 2: Pos.Ayá.\nPaso 3: Builder: repara, cruza, conecta, envía 3.\n\nFROM: Chief Office\nCada segundo disponible puede convertirse en valor.\n\nFROM: PR_Worm\nSi sientes que terminaste, revisa si todavía estás disponible.</div>`,b('VOLVER','hub')+b('USAR POS.AYÁ','posaya','primary'));if(st.step==='posaya'){st.pos=1;h+=card('🧸 POS.AYÁ / WayPoint-O',`<p>Ítem + herramienta + compañero + menú diegético. Cada zona elige una intención.</p><div class="doll">${b('👁️ Mirar','pa:look')}${b('👄 Hablar','pa:talk')}${b('✋ Usar/Tomar','pa:use')}${b('🦶 Ir a','pa:go')}${b('▤ Reparar','pa:repair')}${b('🧱 Construir','pa:build')}</div><div class="term">Pos.Ayá: "No todo lo guardado queda perdido. Algunas rutas solo esperan permiso."</div>`,b('VOLVER','hub','primary')+b('IR A BUILDER','build'))}if(st.step==='rest')h+=card('🌱 MICROPAUSA',`<p>No aumenta productividad inmediata. Puede mejorar tu estado.</p><p>La Corporation no penaliza micropausas. Todavía.</p>`,b('RECUPERAR ENERGÍA','recover','primary')+b('TRABAJAR','build'));if(st.step==='build')h+=builder();if(st.step==='won')h+=win();$('#view').innerHTML=h;bind();save()}function builder(){return card('🧱 BUILDER MÍNIMO',`<p>Ganas cuando el objetivo diga 5/5 y veas GANASTE. Usa Pos.Ayá si no sabes qué acción toca.</p><div class="grid"><div class="card ${st.repair?'ok':''}">▤ Roto ${b('Usar Tape','repair')}</div><div class="card ${st.bridge?'ok':''}">⬚ Hueco ${b('Usar Sticks','bridge')}</div><div class="card ${st.route?'ok':''}">I → O Ruta ${b('Conectar ruta','route')}</div><div class="card ${st.items.phone&&st.items.chip?'ok':''}">📱 Señal ${b('Probar Phone+Chip','line')}</div></div><div class="term">Paquetes enviados: ${st.ship}/3\nRuta lista: ${st.route&&st.repair&&st.bridge?'sí':'no'}\nSomero: ${som()}</div>`,b('ENVIAR PAQUETE','send','primary')+b('🪱 PR_Worm optimiza','worm')+b('🧸 Pos.Ayá','posaya')+b('REINICIAR BUILDER','reset'))}function win(){return card('🏁 GANASTE LA ORIENTACIÓN C6B',`<div class="card ok"><b>Qué hiciste:</b><br>Guardaste ítems, registraste Somero, usaste Pos.Ayá, reparaste, construiste y enviaste 3 paquetes. La orientación terminó.</div><div class="term">${report()}</div>`,b('COPIAR REPORTE','copy','primary')+b('ABRIR REVIEW','review')+b('VOLVER AL HUB','hub'))+review()}function review(){return card('⚠ C6B REVIEW',`<textarea id="rv" placeholder="Qué entendiste, qué no, prioridad P0/P1/P2/P3" style="width:100%;min-height:120px">${esc(st.review)}</textarea>`,b('COPIAR REVIEW','copyReview','primary')+b('VOLVER','hub'))}function bind(){document.querySelectorAll('[data-a]').forEach(x=>x.onclick=()=>act(x.dataset.a));let a=$('#alias');if(a)a.oninput=e=>st.alias=(e.target.value||'Human_01').slice(0,24);let r=$('#rv');if(r)r.oninput=e=>st.review=e.target.value;document.querySelectorAll('[data-mode]').forEach(x=>x.onclick=()=>{st.mode=x.dataset.mode;if(st.mode==='builder'){names.forEach(k=>st.items[k]=1);st.step='build'}render()})}function act(a){if(a==='active'){st.mode='active';st.step='app'}else if(a==='builder'){st.mode='builder';names.forEach(k=>st.items[k]=1);st.step='build'}else if(a==='human'){st.alias='Human_01';st.step='avatar'}else if(a==='av'){st.step='items'}else if(['app','avatar','items','box','hub','book','mail','posaya','rest','build','review'].includes(a)){st.step=a}else if(a==='all'){names.forEach(k=>st.items[k]=1);toast('Ítems completos')}else if(a.startsWith('it:')){let k=a.slice(3);st.items[k]=st.items[k]?0:1}else if(a==='close'){if(!names.every(k=>st.items[k])){toast('Faltan ítems necesarios');st.step='items'}else{st.box=1;st.step='hub'}}else if(a==='recover'){st.energy=Math.min(100,st.energy+15);st.step='build'}else if(a==='repair'){if(!st.items.tape)return toast('Necesitas Tape');st.repair=1;st.energy-=2;toast('Reparado')}else if(a==='bridge'){if(!st.items.sticks)return toast('Necesitas Sticks');st.bridge=1;st.energy-=3;toast('Puente creado')}else if(a==='route'){st.route=1;st.energy-=1;toast('Ruta conectada')}else if(a==='line'){toast(st.items.phone&&st.items.chip?'Señal mínima confirmada':'Necesitas Phone y Chip/SIM')}else if(a==='worm'){st.route=st.repair=st.bridge=1;st.energy-=15;st.coins+=2;toast('PR_Worm optimizó y habló demasiado')}else if(a==='send'){if(st.won)return toast('Ya ganaste. Abre Review.');if(!(st.route&&st.repair&&st.bridge))return toast('Ruta incompleta');st.ship++;st.coins+=10;if(st.ship>=3){st.ship=3;st.won=1;st.step='won'}}else if(a==='reset'){st.ship=0;st.won=0;st.route=st.repair=st.bridge=0;st.step='build'}else if(a.startsWith('pa:')){toast(({look:'Mirar: detecta objetos útiles',talk:'Hablar: recuerda contexto',use:'Usar/Tomar: elige ítems',go:'Ir a: abre rutas',repair:'Reparar: usa Tape',build:'Construir: ruta o Sticks'})[a.slice(3)]||'Intención');}else if(a==='copy')copy(report());else if(a==='copyReview')copy(JSON.stringify({review:st.review,report:JSON.parse(report())},null,2));log(a);render()}function report(){return JSON.stringify({build:'C6B1_DIEGETIC_POSAYA_CLARITY_FIX',status:'ready_for_human_test_not_playable_confirmed',alias:st.alias,mode:st.mode,won:!!st.won,shipments:st.ship,coins:st.coins,energy:st.energy,items:st.items,somero:som(),log:st.log.slice(-12)},null,2)}function copy(x){navigator.clipboard?navigator.clipboard.writeText(x).then(()=>toast('Copiado')).catch(()=>prompt('Copia manual',x)):prompt('Copia manual',x)}$('#debug').onclick=()=>{$('#view').innerHTML=card('SelfDebug',`<div class="term">${esc(JSON.stringify({items:Object.keys(st.items).length,winLocked:st.ship<=3,noExternal:!document.querySelector('script[src]'),posAya:true},null,2))}</div>`,b('VOLVER','hub'));bind()};$('#copy').onclick=()=>copy(report());render()})();</script></body></html>
