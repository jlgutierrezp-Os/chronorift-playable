<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>ChronoRift C6B2</title><style>
*{box-sizing:border-box}html,body{margin:0;background:#070b10;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif}button,input,textarea{font:inherit}button{min-height:44px;border:1px solid #405066;background:#192332;color:#f8fafc;border-radius:14px;padding:10px 12px;margin:3px;font-weight:800}.primary{background:#f8fafc;color:#071019}.app{max-width:980px;margin:auto;padding:8px}.top{position:sticky;top:0;background:#071019f2;z-index:5;border-bottom:1px solid #263445;padding:8px}.pill{display:inline-block;border:1px solid #3a4b60;color:#c9d4e2;border-radius:999px;padding:4px 8px;font-size:12px;margin:2px}.wrap{display:grid;grid-template-columns:1fr 310px;gap:10px}.panel,.card{border:1px solid #334155;background:#111923;border-radius:18px;padding:10px;margin:8px 0}.card.ok{border-color:#71e8a2;background:#102619}.card.warn{border-color:#fbbf24;background:#271d10}.small{font-size:13px;color:#acb9c8}.term{white-space:pre-wrap;background:#0c121a;border:1px solid #334155;border-radius:12px;padding:9px;font-family:ui-monospace,Menlo,monospace;font-size:12px}.row{display:flex;gap:4px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}.doll{display:grid;grid-template-columns:1fr 1fr;gap:6px}.canvasBox{position:relative}.hint{font-size:13px;color:#e6f6ff}.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#fff;color:#111;border-radius:14px;padding:10px 12px;font-weight:900;display:none;z-index:20}@media(max-width:800px){.wrap,.grid{grid-template-columns:1fr}.app{padding:6px}button{width:auto}canvas{height:auto;width:100%}}
</style></head><body><div class="app"><div class="top"><b>ChronoRift C6B2 · Visual Room Playable</b><br><span class="small">ready_for_human_test · low-processor · no cuenta · no pago</span><div><span class="pill">Modo <b id="mode">RPG</b></span><span class="pill">Objetivo <b id="obj">0/6</b></span><span class="pill">Paquetes <b id="ship">0/3</b></span><span class="pill">Coins <b id="coins">0</b></span><span class="pill">Energía <b id="energy">100</b></span></div><div class="row"><button data-mode="rpg">RPG</button><button data-mode="active">Active/Comic</button><button data-mode="builder">Builder</button><button id="debug">SelfDebug</button><button id="copy">Copiar reporte</button></div></div><div class="wrap"><div><div class="panel canvasBox"><canvas id="cv" width="760" height="470"></canvas></div><div id="story" class="panel"></div></div><aside><div id="goals"></div><div id="actions" class="panel"></div><div id="log" class="panel term"></div></aside></div></div><div id="toast" class="toast"></div><script>
(()=>{'use strict';const $=q=>document.querySelector(q),cv=$('#cv'),x=cv.getContext('2d');const loc={desk:[130,310],box:[70,120],pos:[585,145],conv:[330,315],out:[640,330],flower:[480,70]};const items=['phone','chip','tape','sticks','flower'];const itemText={phone:'📱 Phone',chip:'▣ Chip/SIM',tape:'▤ Tape',sticks:'╱╲ Sticks',flower:'🌱 Flower'};let st={v:'C6B2_VISUAL_ROOM_PLAYABLE',mode:'rpg',alias:'Human_01',at:'desk',items:{phone:0,chip:0,tape:0,sticks:0,flower:0},stuff:0,book:0,laptop:0,posaya:0,repair:0,bridge:0,route:0,flowerUsed:0,ship:0,coins:0,energy:100,won:0,anim:0,act:'look',review:'',log:[]};try{let p=JSON.parse(localStorage.cr_c6b2||'null');if(p&&p.v===st.v)st=p}catch(e){}function save(){localStorage.cr_c6b2=JSON.stringify(st)}function say(m){st.log.push(new Date().toLocaleTimeString()+' '+m);st.log=st.log.slice(-12);toast(m);renderUI();save()}function toast(m){let t=$('#toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1600)}function allItems(){return items.every(k=>st.items[k])}function goals(){return [st.stuff,st.book,st.laptop,st.posaya,st.repair&&st.bridge&&st.route,st.won].filter(Boolean).length}function som(){return `${st.alias}-C6B2-${st.won?'WON':'OPEN'}-SHIP${st.ship}-E${st.energy}-C${st.coins}`.replace(/[^A-Za-z0-9_-]/g,'')}function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function b(t,a,c=''){return `<button class="${c}" data-a="${a}">${t}</button>`}function text(){if(st.mode==='active')return 'Meta rápida: guarda ítems, usa Pos.Ayá, repara ruta, envía 3 paquetes. Cuando veas GANASTE, terminó.';return 'Estás en tu cubículo. La Corporation convirtió una orientación simple en un Loop medible. Pos.Ayá existe en la mesa: es ítem, herramienta, menú diegético y compañero naciente.'}function renderUI(){let gs=[['stuff','Guardar todos los Personal Belongings'],['book','Abrir Notebook / Somero'],['laptop','Leer Laptop'],['posaya','Usar Pos.Ayá objeto-menú'],['route','Reparar + cruzar + conectar ruta'],['won','Enviar 3 paquetes y ver GANASTE']];$('#goals').innerHTML='<div class="panel"><b>Cómo gano</b>'+gs.map(([k,t])=>`<div class="card ${((k==='route')?st.repair&&st.bridge&&st.route:st[k])?'ok':''}">${((k==='route')?st.repair&&st.bridge&&st.route:st[k])?'✓':'□'} ${t}</div>`).join('')+'</div>';$('#actions').innerHTML=actions();$('#log').textContent='Somero: '+som()+'\n\n'+st.log.join('\n');$('#story').innerHTML='<b>Historia activa</b><p>'+text()+'</p>'+winText();$('#mode').textContent=st.mode;$('#obj').textContent=goals()+'/6';$('#ship').textContent=st.ship+'/3';$('#coins').textContent=st.coins;$('#energy').textContent=st.energy;document.querySelectorAll('[data-a]').forEach(q=>q.onclick=()=>act(q.dataset.a));let rv=$('#rv');if(rv)rv.oninput=e=>st.review=e.target.value;document.querySelectorAll('[data-mode]').forEach(q=>q.onclick=()=>{st.mode=q.dataset.mode;if(st.mode==='builder'){items.forEach(k=>st.items[k]=1);st.stuff=1;st.at='conv'}say('Modo '+st.mode)})}function actions(){if(st.won)return `<b>Completado</b><p class="small">Ya ganaste esta orientación. Puedes copiar reporte o revisar.</p>${b('Copiar reporte','copy','primary')}${b('Abrir review','review')}${b('Reset','reset')}`;let base=`<div class="row">${b('Ir Desk','go:desk')}${b('Ir Stuff Box','go:box')}${b('Ir Pos.Ayá','go:pos')}${b('Ir Conveyor','go:conv')}${b('Ir Output','go:out')}</div>`;if(st.at==='desk')base+=`<h3>Desk</h3>${b('📓 Notebook/Somero','book','primary')}${b('💻 Laptop','laptop')}${b('🧸 Tomar Pos.Ayá','go:pos')}`;if(st.at==='box')base+=`<h3>Stuff Box</h3>${items.map(k=>b((st.items[k]?'✓ ':'')+itemText[k],'item:'+k)).join('')}${b('Guardar todos','all','primary')}`;if(st.at==='pos')base+=`<h3>Pos.Ayá / WayPoint-O</h3><p class="small">Objeto físico con hotspots: selector de acciones.</p><div class="doll">${b('👁️ Mirar','pa:look')}${b('👄 Hablar','pa:talk')}${b('✋ Usar/Tomar','pa:use')}${b('🦶 Ir a','pa:go')}${b('▤ Reparar','pa:repair')}${b('🧱 Construir','pa:build')}</div>`;if(st.at==='conv')base+=`<h3>Conveyor</h3>${b((st.repair?'✓ ':'')+'Usar Tape para reparar ▤','repair')}${b((st.bridge?'✓ ':'')+'Usar Sticks para cruzar ⬚','bridge')}${b((st.route?'✓ ':'')+'Conectar ruta I→O','route','primary')}${b('🪱 PR_Worm optimiza y habla','worm')}`;if(st.at==='out')base+=`<h3>Output</h3>${b('📱 Probar Phone + Chip','line')}${b('Enviar paquete visible','send','primary')}`;base+=`<h3>Review</h3>${b('Abrir review','review')}`;return base}function winText(){return st.won?'<div class="card ok"><h2>🏁 GANASTE</h2>Guardaste ítems, usaste Pos.Ayá, reparaste la ruta y enviaste 3 paquetes. C6B2 terminó.</div>':''}function act(a){if(a.startsWith('go:')){st.at=a.slice(3);say('Fuiste a '+st.at)}else if(a.startsWith('item:')){let k=a.slice(5);st.items[k]=1;say(itemText[k]+' guardado')}else if(a==='all'){items.forEach(k=>st.items[k]=1);st.stuff=1;say('Personal Belongings completos')}else if(a==='book'){st.book=1;say('Notebook/Somero abierto')}else if(a==='laptop'){st.laptop=1;say('Laptop: Supervisor, Chief Office y PR_Worm leídos')}else if(a.startsWith('pa:')){st.posaya=1;let m={look:'Mirar detecta objetos útiles.',talk:'Pos.Ayá habla: algunas rutas esperan permiso.',use:'Usar/Tomar abre interacción con ítems.',go:'Ir a mueve intención por el cuarto.',repair:'Reparar sugiere Tape.',build:'Construir sugiere Sticks + ruta.'}[a.slice(3)];say(m)}else if(a==='repair'){if(!st.items.tape)return say('Falta Tape');st.repair=1;st.energy-=2;say('Conveyor reparado con Tape')}else if(a==='bridge'){if(!st.items.sticks)return say('Faltan Sticks');st.bridge=1;st.energy-=3;say('Puente mínimo creado')}else if(a==='route'){if(!(st.repair&&st.bridge))return say('Primero repara y cruza el hueco');st.route=1;st.energy-=1;say('Ruta conectada I→O')}else if(a==='worm'){st.repair=st.bridge=st.route=1;st.energy-=15;st.coins+=2;say('PR_Worm optimizó y dio charla somnífera')}else if(a==='line'){say(st.items.phone&&st.items.chip?'Señal exterior confirmada':'Necesitas Phone y Chip/SIM')}else if(a==='send'){if(st.won)return say('Ya ganaste. Abre review.');if(!allItems())return say('Faltan ítems necesarios');if(!(st.repair&&st.bridge&&st.route))return say('Ruta incompleta');st.anim=1;say('Paquete en movimiento...')}else if(a==='review'){openReview();return}else if(a==='copy'){copy(report())}else if(a==='reset'){localStorage.removeItem('cr_c6b2');location.reload()}renderUI();draw()}function openReview(){$('#story').innerHTML='<div class="panel"><h2>⚠ C6B2 REVIEW</h2><textarea id="rv" style="width:100%;min-height:130px" placeholder="Qué fue divertido, qué no, qué visual faltó, P0/P1/P2/P3">'+esc(st.review)+'</textarea>'+b('Copiar review','copyReview','primary')+b('Volver','go:desk')+'</div>';document.querySelectorAll('[data-a]').forEach(q=>q.onclick=()=>act(q.dataset.a));$('#rv').oninput=e=>st.review=e.target.value}function report(){return JSON.stringify({build:st.v,status:'ready_for_human_test_not_playable_confirmed',alias:st.alias,mode:st.mode,won:!!st.won,shipments:st.ship,coins:st.coins,energy:st.energy,items:st.items,objectives:goals()+'/6',somero:som(),review:st.review,log:st.log},null,2)}function copy(s){navigator.clipboard?navigator.clipboard.writeText(s).then(()=>toast('Copiado')).catch(()=>prompt('Copia manual',s)):prompt('Copia manual',s)}$('#copy').onclick=()=>copy(report());$('#debug').onclick=()=>{let r={items:items.every(k=>k in st.items),noExternal:!document.querySelector('script[src]'),posAyaDiegetic:true,winBlockedAfter3:st.ship<=3,reviewField:true};toast('SelfDebug copiado/visible');$('#story').innerHTML='<div class="panel"><h2>SelfDebug</h2><pre class="term">'+esc(JSON.stringify(r,null,2))+'</pre></div>'};function draw(){x.clearRect(0,0,cv.width,cv.height);x.fillStyle='#0d1420';x.fillRect(0,0,760,470);x.fillStyle='#111827';x.fillRect(30,50,700,360);x.strokeStyle='#41536a';x.lineWidth=2;x.strokeRect(30,50,700,360);zone('desk','Desk',110,290,'#17314a');zone('box','Stuff Box',58,105,'#3a2c12');zone('pos','Pos.Ayá',555,105,'#261f45');zone('conv','Conveyor',260,285,'#173126');zone('out','Output',620,295,'#283817');zone('flower','Flower',455,60,'#183625');x.strokeStyle=st.route?'#90f7ba':'#546174';x.lineWidth=st.route?8:3;x.beginPath();x.moveTo(295,325);x.lineTo(635,330);x.stroke();if(!st.repair){x.fillStyle='#f59e0b';x.fillRect(360,315,35,25);x.fillStyle='#111';x.fillText('▤',370,333)}if(!st.bridge){x.fillStyle='#7c3aed';x.fillRect(470,315,35,25);x.fillStyle='#fff';x.fillText('⬚',480,333)}drawDoll(600,155);let [px,py]=loc[st.at]||loc.desk;x.fillStyle='#f8fafc';x.beginPath();x.arc(px,py,16,0,7);x.fill();x.fillStyle='#0b0f14';x.fillText('H',px-5,py+5);if(st.anim){let tt=(Date.now()%900)/900,xx=300+310*tt;x.fillStyle='#c99852';x.fillRect(xx,335,24,18);x.fillStyle='#fff';x.fillText('📦',xx,332);if(tt>.96){st.anim=0;st.ship=Math.min(3,st.ship+1);st.coins+=10;if(st.ship>=3){st.won=1;say('GANASTE la orientación C6B2')}else say('Paquete enviado '+st.ship)}}requestAnimationFrame(draw)}function zone(k,label,a,b,col){let on=st.at===k;x.fillStyle=col;x.fillRect(a,b,110,58);x.strokeStyle=on?'#fff':'#5f6f85';x.lineWidth=on?4:1;x.strokeRect(a,b,110,58);x.fillStyle='#fff';x.font='14px system-ui';x.fillText(label,a+8,b+32)}function drawDoll(a,b){x.fillStyle='#d8c0a0';x.beginPath();x.arc(a,b,28,0,7);x.fill();x.fillStyle='#111';x.fillText('👁️',a-18,b-5);x.fillText('👄',a-10,b+17);x.strokeStyle='#d8c0a0';x.lineWidth=8;x.beginPath();x.moveTo(a-20,b+25);x.lineTo(a-45,b+55);x.moveTo(a+20,b+25);x.lineTo(a+45,b+55);x.moveTo(a-12,b+30);x.lineTo(a-28,b+75);x.moveTo(a+12,b+30);x.lineTo(a+28,b+75);x.stroke()}renderUI();draw();})();</script></body></html>
