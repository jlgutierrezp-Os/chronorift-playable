<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>ChronoRift C6B3</title><style>
*{box-sizing:border-box}html,body{margin:0;background:#07090c;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif;overflow-x:hidden}button,input,textarea{font:inherit}button{min-height:44px;border:1px solid #3d4b5f;background:#172131;color:#f8fafc;border-radius:14px;padding:10px 12px;margin:3px;font-weight:850}.primary{background:#f8fafc;color:#071019}.app{max-width:980px;margin:auto;padding:8px}.top{position:sticky;top:0;background:#07090cf4;border-bottom:1px solid #28364a;z-index:5;padding:8px}.pill{display:inline-block;border:1px solid #3b4c62;color:#cdd7e5;border-radius:999px;padding:4px 8px;font-size:12px;margin:2px}.layout{display:grid;grid-template-columns:1fr 320px;gap:10px}.panel{border:1px solid #324256;background:#101720;border-radius:18px;padding:10px;margin:8px 0}.ok{background:#0e2718;border-color:#72e8a6}.warn{background:#271a0c;border-color:#fbbf24}.small{font-size:13px;color:#aebaca}.term{white-space:pre-wrap;background:#0b1118;border:1px solid #324256;border-radius:12px;padding:9px;font-family:ui-monospace,Menlo,monospace;font-size:12px}.actions{display:flex;flex-wrap:wrap;gap:4px}.dollBtns{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.toast{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;background:#fff;color:#111;border-radius:14px;padding:10px 12px;font-weight:900}canvas{width:100%;height:auto;border-radius:18px;background:#0b1118;border:1px solid #324256}@media(max-width:820px){.layout{grid-template-columns:1fr}.app{padding:6px}.dollBtns{grid-template-columns:1fr}}
</style></head><body><div class="app"><div class="top"><b>ChronoRift C6B3 · Primera Persona / Pos.Ayá</b><br><span class="small">ready_for_human_test · web estático · sin cuenta · sin pago</span><div><span class="pill">Vista <b id="viewLbl">Desk</b></span><span class="pill">Modo <b id="modeLbl">RPG</b></span><span class="pill">Objetivo <b id="objLbl">0/6</b></span><span class="pill">Paquetes <b id="shipLbl">0/3</b></span><span class="pill">Energía <b id="energyLbl">100</b></span></div><div class="actions"><button data-mode="rpg">RPG</button><button data-mode="active">Active</button><button data-mode="builder">Builder</button><button id="selfdebug">SelfDebug</button><button id="copyReport">Copiar reporte</button></div></div><div class="layout"><main><canvas id="cv" width="820" height="480"></canvas><div id="narr" class="panel"></div></main><aside><div id="goals" class="panel"></div><div id="posaya" class="panel"></div><div id="actions" class="panel"></div><div id="log" class="panel term"></div></aside></div></div><div id="toast" class="toast"></div><script>
(()=>{'use strict';const $=q=>document.querySelector(q),cv=$('#cv'),ctx=cv.getContext('2d');const views=['desk','locker','posaya','conveyor','output'];const items=['phone','chip','tape','sticks','flower'];let st={v:'C6B3_FIRST_PERSON_POSAYA',mode:'rpg',view:'desk',alias:'Human_01',items:{phone:0,chip:0,tape:0,sticks:0,flower:0},book:0,laptop:0,stuff:0,pos:0,looked:0,talked:0,held:0,route:0,repair:0,bridge:0,ship:0,energy:100,coins:0,won:0,anim:0,review:'',log:[]};try{let old=JSON.parse(localStorage.cr_c6b3||'null');if(old&&old.v===st.v)st=old}catch(e){}function save(){localStorage.cr_c6b3=JSON.stringify(st)}function say(m){st.log.push(new Date().toLocaleTimeString()+' '+m);st.log=st.log.slice(-14);toast(m);ui();save()}function toast(m){const t=$('#toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1700)}function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function b(t,a,c=''){return `<button class="${c}" data-a="${a}">${t}</button>`}function allItems(){return items.every(k=>st.items[k])}function objectives(){return [st.book,st.laptop,st.stuff,st.pos,st.route&&st.repair&&st.bridge,st.won].filter(Boolean).length}function som(){return `${st.alias}-C6B3-${st.won?'WON':'OPEN'}-SHIP${st.ship}-E${st.energy}-C${st.coins}`.replace(/[^A-Za-z0-9_-]/g,'')}function story(){if(st.won)return '<h2>Ganaste la orientación</h2><p>Guardaste tus cosas, consultaste Somero, usaste Pos.Ayá, reparaste la ruta y enviaste tres paquetes. La puerta de entrenamiento queda abierta para la siguiente versión.</p>';if(st.mode==='active')return '<b>Meta:</b> mira el cuarto, guarda ítems, usa Pos.Ayá, repara la ruta y envía 3 paquetes.';return '<b>Estás en primera persona.</b> El cuarto no explica interfaces: las contiene. Pos.Ayá está en tus manos cuando lo usas, y cada parte sugiere una acción.'}function ui(){draw();$('#viewLbl').textContent=({desk:'Desk',locker:'Stuff Box',posaya:'Pos.Ayá',conveyor:'Conveyor',output:'Output'})[st.view];$('#modeLbl').textContent=st.mode;$('#objLbl').textContent=objectives()+'/6';$('#shipLbl').textContent=st.ship+'/3';$('#energyLbl').textContent=st.energy;$('#narr').innerHTML=story();$('#goals').innerHTML='<b>Cómo avanzo</b>'+[['book','Notebook/Somero'],['laptop','Laptop'],['stuff','Personal Belongings en Stuff Box'],['pos','Pos.Ayá usado'],['route','Tape + Sticks + Ruta'],['won','Enviar 3 paquetes']].map(([k,t])=>`<div class="panel ${((k==='route')?st.route&&st.repair&&st.bridge:st[k])?'ok':''}">${((k==='route')?st.route&&st.repair&&st.bridge:st[k])?'✓':'□'} ${t}</div>`).join('');$('#posaya').innerHTML=posPanel();$('#actions').innerHTML=actPanel();$('#log').textContent='Somero: '+som()+'\n\n'+st.log.join('\n');document.querySelectorAll('[data-a]').forEach(q=>q.onclick=()=>act(q.dataset.a));document.querySelectorAll('[data-mode]').forEach(q=>q.onclick=()=>{st.mode=q.dataset.mode;if(st.mode==='builder'){items.forEach(k=>st.items[k]=1);st.stuff=1;st.view='conveyor'}say('Modo '+st.mode)});let rv=$('#rv');if(rv)rv.oninput=e=>st.review=e.target.value}function posPanel(){return `<b>Pos.Ayá en mano</b><p class="small">Toca una parte del objeto para expresar intención.</p><div class="dollBtns">${b('👁️ Mirar','pa:look')}${b('👄 Hablar','pa:talk')}${b('✋ Usar/Tomar','pa:use')}${b('🦶 Ir a','pa:go')}${b('▤ Reparar','pa:repair')}${b('🧱 Construir','pa:build')}</div>`}function actPanel(){if(st.won)return `<b>Orientación completada</b><p class="small">Ya ganaste. Puedes copiar reporte o escribir review.</p>${b('Copiar reporte','copy','primary')}${b('Abrir review','review')}${b('Reiniciar','reset')}`;let nav=`<b>Mover mirada/cuerpo</b><div class="actions">${b('Desk','go:desk')}${b('Stuff Box','go:locker')}${b('Pos.Ayá','go:posaya')}${b('Conveyor','go:conveyor')}${b('Output','go:output')}</div>`;let a='';if(st.view==='desk')a=`<h3>Desk</h3>${b('Abrir Notebook/Somero','book','primary')}${b('Leer Laptop','laptop')}${b('Tomar Pos.Ayá','go:posaya')}`;if(st.view==='locker')a=`<h3>Stuff Box</h3>${items.map(k=>b((st.items[k]?'✓ ':'')+({phone:'📱 Phone',chip:'▣ Chip/SIM',tape:'▤ Tape',sticks:'╱╲ Sticks',flower:'🌱 Flower'})[k],'item:'+k)).join('')}${b('Guardar todos','all','primary')}`;if(st.view==='posaya')a=`<h3>Pos.Ayá</h3>${b('Hablar con Pos.Ayá','pa:talk','primary')}${b('Pedir intención de reparación','pa:repair')}${b('Pedir intención de construcción','pa:build')}`;if(st.view==='conveyor')a=`<h3>Conveyor</h3>${b((st.repair?'✓ ':'')+'Aplicar Tape','repair')}${b((st.bridge?'✓ ':'')+'Colocar Sticks','bridge')}${b((st.route?'✓ ':'')+'Conectar I→O','route','primary')}${b('🪱 Dejar que PR_Worm ayude','worm')}`;if(st.view==='output')a=`<h3>Output</h3>${b('Probar Phone + Chip/SIM','line')}${b('Enviar paquete','send','primary')}`;return nav+a+'<hr>'+b('Abrir review','review')}function act(a){if(a.startsWith('go:')){st.view=a.slice(3);say('Vas a '+st.view)}else if(a.startsWith('item:')){let k=a.slice(5);st.items[k]=1;say('Guardaste '+k);if(allItems())st.stuff=1}else if(a==='all'){items.forEach(k=>st.items[k]=1);st.stuff=1;say('Personal Belongings completos')}else if(a==='book'){st.book=1;say('Notebook/Somero recuerda contexto')}else if(a==='laptop'){st.laptop=1;say('Laptop: Supervisor, Chief Office y PR_Worm leídos')}else if(a.startsWith('pa:')){st.pos=1;let v=a.slice(3),m={look:'Pos.Ayá mira contigo: objetos útiles resaltan en tu atención.',talk:'Pos.Ayá: "Las rutas no flotan. Las haces con tus manos."',use:'Pos.Ayá prepara intención de tomar/usar.',go:'Pos.Ayá apunta al lugar siguiente.',repair:'Pos.Ayá señala Tape y la rotura del conveyor.',build:'Pos.Ayá señala Sticks, ruta y salida.'}[v];if(v==='look')st.looked=1;if(v==='talk')st.talked=1;if(v==='use')st.held=1;say(m)}else if(a==='repair'){if(!st.items.tape)return say('Falta Tape en Stuff Box');st.repair=1;st.energy-=2;say('Reparaste el conveyor con Tape')}else if(a==='bridge'){if(!st.items.sticks)return say('Faltan Sticks en Stuff Box');st.bridge=1;st.energy-=3;say('Cruzaste el hueco con Sticks')}else if(a==='route'){if(!(st.repair&&st.bridge))return say('Primero repara y cruza el hueco');st.route=1;st.energy-=1;say('Ruta I→O conectada')}else if(a==='worm'){st.repair=st.bridge=st.route=1;st.energy-=15;st.coins+=2;say('PR_Worm acelera todo y te da sueño')}else if(a==='line'){say(st.items.phone&&st.items.chip?'Señal exterior confirmada':'Necesitas Phone y Chip/SIM')}else if(a==='send'){if(st.won)return say('Ya ganaste');if(!allItems())return say('Faltan Personal Belongings necesarios');if(!(st.repair&&st.bridge&&st.route))return say('Ruta incompleta');st.anim=1;say('Paquete visible en ruta')}else if(a==='review'){openReview();return}else if(a==='copy'){copy(report())}else if(a==='reset'){localStorage.removeItem('cr_c6b3');location.reload()}ui()}function openReview(){$('#narr').innerHTML='<h2>Review C6B3</h2><p>Escribe qué fue más juego, qué siguió plano, qué falta visualmente.</p><textarea id="rv" style="width:100%;min-height:140px" placeholder="Comentario humano P0/P1/P2/P3">'+esc(st.review)+'</textarea>'+b('Copiar review','copyReview','primary');document.querySelector('[data-a="copyReview"]').onclick=()=>copy(JSON.stringify({review:$('#rv').value,report:JSON.parse(report())},null,2));$('#rv').oninput=e=>st.review=e.target.value}function report(){return JSON.stringify({build:st.v,status:'ready_for_human_test_not_playable_confirmed',alias:st.alias,mode:st.mode,won:!!st.won,shipments:st.ship,coins:st.coins,energy:st.energy,items:st.items,objectives:objectives()+'/6',somero:som(),review:st.review,log:st.log},null,2)}function copy(s){navigator.clipboard?navigator.clipboard.writeText(s).then(()=>toast('Copiado')).catch(()=>prompt('Copia manual',s)):prompt('Copia manual',s)}$('#copyReport').onclick=()=>copy(report());$('#selfdebug').onclick=()=>{$('#narr').innerHTML='<h2>SelfDebug</h2><pre class="term">'+esc(JSON.stringify({firstPerson:true,posAyaInHand:true,noDesignJargonVisible:true,noExternalDeps:!document.querySelector('script[src]'),win3Packages:st.ship<=3},null,2))+'</pre>'};function draw(){ctx.clearRect(0,0,820,480);ctx.fillStyle='#0a0f17';ctx.fillRect(0,0,820,480);ctx.fillStyle='#151f2d';ctx.beginPath();ctx.moveTo(80,90);ctx.lineTo(740,90);ctx.lineTo(690,410);ctx.lineTo(130,410);ctx.closePath();ctx.fill();ctx.strokeStyle='#43546b';ctx.stroke();ctx.fillStyle='#0f1724';ctx.fillRect(130,270,560,120);ctx.fillStyle='#24344a';ctx.fillRect(150,245,130,60);ctx.fillStyle='#fff';ctx.fillText('Desk',190,280);ctx.fillStyle='#3a2c12';ctx.fillRect(80,185,120,90);ctx.fillStyle='#fff';ctx.fillText('Stuff Box',105,235);ctx.fillStyle='#173126';ctx.fillRect(300,300,220,55);ctx.fillStyle='#fff';ctx.fillText(st.route?'Route ON':'Conveyor',360,333);if(!st.repair){ctx.fillStyle='#f59e0b';ctx.fillRect(350,310,30,25);ctx.fillStyle='#111';ctx.fillText('▤',358,329)}if(!st.bridge){ctx.fillStyle='#7c3aed';ctx.fillRect(420,310,30,25);ctx.fillStyle='#fff';ctx.fillText('⬚',428,329)}ctx.fillStyle='#283817';ctx.fillRect(630,270,110,90);ctx.fillStyle='#fff';ctx.fillText('Output',665,320);ctx.fillStyle='#183625';ctx.fillRect(555,120,80,60);ctx.fillStyle='#fff';ctx.fillText('Flower',570,155);if(st.view==='posaya'||st.pos){drawPosAya(610,355)}else{ctx.fillStyle='#bda280';ctx.fillRect(575,355,70,35);ctx.fillStyle='#111';ctx.fillText('Pos.Ayá',585,377)}let vx={desk:210,locker:145,posaya:610,conveyor:385,output:680}[st.view]||210,vy={desk:240,locker:175,posaya:315,conveyor:285,output:255}[st.view]||240;ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(vx-8,vy-8,16,16);if(st.anim){let t=(Date.now()%900)/900,px=305+330*t;ctx.fillStyle='#c99852';ctx.fillRect(px,322,28,20);ctx.fillStyle='#fff';ctx.fillText('📦',px,318);if(t>.96){st.anim=0;st.ship=Math.min(3,st.ship+1);st.coins+=10;if(st.ship>=3){st.won=1;say('GANASTE: 3 paquetes enviados')}else say('Paquete enviado '+st.ship)}}requestAnimationFrame(draw)}function drawPosAya(a,b){ctx.fillStyle='#d6c1a2';ctx.beginPath();ctx.arc(a,b,38,0,7);ctx.fill();ctx.fillStyle='#111';ctx.fillText('👁️',a-25,b-6);ctx.fillText('👁️',a+4,b-6);ctx.fillText('👄',a-8,b+20);ctx.strokeStyle='#d6c1a2';ctx.lineWidth=10;ctx.beginPath();ctx.moveTo(a-28,b+30);ctx.lineTo(a-70,b+70);ctx.moveTo(a+28,b+30);ctx.lineTo(a+70,b+70);ctx.moveTo(a-15,b+38);ctx.lineTo(a-35,b+95);ctx.moveTo(a+15,b+38);ctx.lineTo(a+35,b+95);ctx.stroke();ctx.fillStyle='#e6f6ff';ctx.font='13px system-ui';ctx.fillText('Pos.Ayá',a-25,b-48)}ui();draw();})();</script></body></html>
