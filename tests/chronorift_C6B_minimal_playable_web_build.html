<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>ChronoRift C6B</title><style>
*{box-sizing:border-box}html,body{margin:0;background:#0b0f14;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif}button,input,textarea{font:inherit}button{border:1px solid #3a4655;background:#202a36;color:#f8fafc;border-radius:14px;padding:12px 14px;min-height:44px;font-weight:800}button.primary{background:#f8fafc;color:#0b0f14}.app{max-width:980px;margin:auto;padding:12px}.top{position:sticky;top:0;background:#0b0f14ee;backdrop-filter:blur(8px);z-index:5;border-bottom:1px solid #26313d;padding:8px 0}.brand{font-weight:900}.pills,.actions,.modes{display:flex;gap:6px;flex-wrap:wrap}.pill{border:1px solid #344050;border-radius:999px;padding:5px 8px;color:#b8c4d0;font-size:12px}.bar{height:8px;border:1px solid #344050;border-radius:99px;overflow:hidden;margin-top:8px}.bar>i{display:block;height:100%;width:0;background:#d7e7ff}.card{border:1px solid #344050;background:#151b23;border-radius:20px;padding:16px;margin:12px 0;box-shadow:0 10px 30px #0006}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.small{color:#a9b5c3;font-size:13px}.term{white-space:pre-wrap;background:#0f151c;border:1px solid #303b49;border-radius:14px;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#e5eef9}.item{border:1px solid #344050;border-radius:14px;padding:10px;background:#101720}.item.on{border-color:#8ff0b8;background:#13251b}.board{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.cell{aspect-ratio:1/1;min-height:38px;border:1px solid #344050;border-radius:9px;background:#0f151c;color:#fff;font-weight:900}.route{background:#173126}.wall{background:#2d3642}.broken{background:#3a2816}.gap{background:#21122b}.start{background:#102b3a}.out{background:#283817}.recovery{background:#183625}.tools{display:grid;gap:8px}.wrap{display:grid;grid-template-columns:1fr 300px;gap:12px}.sel{outline:2px solid #b7f7d2}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#fff;color:#111;border-radius:16px;padding:12px;display:none;font-weight:900;z-index:20}@media(max-width:760px){.grid2,.grid3,.wrap{grid-template-columns:1fr}.card{padding:12px;border-radius:16px}.app{padding:8px}}
</style></head><body><div class="app"><div class="top"><div class="brand">ChronoRift C6B · Minimal Playable Web Build</div><div class="small">ready_for_human_test · web · local · sin cuenta · sin pago</div><div class="pills"><span class="pill">Modo <b id="hm">RPG</b></span><span class="pill">Coins <b id="hc">0</b></span><span class="pill">Energía <b id="he">100</b></span><span class="pill">Logros <b id="ha">0</b></span></div><div class="bar"><i id="prog"></i></div><div class="modes"><button data-mode="rpg">RPG</button><button data-mode="active">Active/Comic</button><button data-mode="builder">Builder</button><button id="dbg">SelfDebug</button><button id="copySom">Copiar Somero</button></div></div><main id="s"></main></div><div class="toast" id="t"></div><script>
(()=>{'use strict';
const $=q=>document.querySelector(q), W=7,H=6,steps=['intro','app','avatar','items','box','hub','book','mail','aya','rest','build','done'];
const st={v:'C6B_MINIMAL_PLAYABLE_WEB_BUILD_V1',mode:'rpg',step:'intro',alias:'Human_01',avatar:'👤 Trainee',coins:0,energy:100,ach:new Set(),badges:new Set(),items:{phone:false,chip:false,tape:false,sticks:false,flower:false},ship:0,tool:'route',worm:0,log:[],review:''};
const item={phone:['📱','Phone','Llamada exterior para verificar que existe mundo fuera del Loop.'],chip:['▣','Chip/SIM','Pequeño, perdible, necesario para probar señal.'],tape:['▤','Tape','Repara una celda rota.'],sticks:['╱╲','Sticks','Cruzan un hueco mínimo.'],flower:['🌱','Miniature Office Flower','Restaura energía sin aumentar productividad.']};
let g=[];function grid(){g=[];for(let y=0;y<H;y++){g[y]=[];for(let x=0;x<W;x++)g[y][x]='empty'}g[2][0]='start';g[2][6]='out';g[0][3]=g[1][3]=g[4][3]='wall';g[2][3]=g[1][5]='broken';g[3][3]=g[4][1]='gap'}grid();
function log(m){st.log.push(new Date().toLocaleTimeString()+' '+m);if(st.log.length>30)st.log.shift()}function toast(m){let t=$('#t');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1900)}function ach(k,m){if(!st.ach.has(k)){st.ach.add(k);toast(m||'★ '+k);log('ACH '+k)}}function badge(k,m){if(!st.badges.has(k)){st.badges.add(k);toast(m||'◆ '+k);log('BADGE '+k)}}
function set(x){st.step=x;log('STEP '+x);render()}function mode(m){st.mode=m;if(m==='builder'){Object.keys(st.items).forEach(k=>st.items[k]=true);ach('Builder_Access','★ Builder Access');set('build')}else render()}function som(){return `${st.alias||'Human_01'}-C6B-${st.step.toUpperCase()}-COINS${st.coins}-E${st.energy}-SHIP${st.ship}`.replace(/[^A-Za-z0-9_-]/g,'').slice(0,90)}function esc(x){return String(x).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function hud(){ $('#hm').textContent=st.mode;$('#hc').textContent=st.coins;$('#he').textContent=st.energy;$('#ha').textContent=st.ach.size;$('#prog').style.width=Math.round(100*steps.indexOf(st.step)/(steps.length-1))+'%';document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('sel',b.dataset.mode===st.mode))}function b(l,a,c=''){return `<button class="${c}" data-a="${a}">${l}</button>`}function c(t,body,act=''){return `<section class="card"><h2>${t}</h2>${body}<div class="actions">${act}</div></section>`}function short(a,b){return st.mode==='active'?b:a}
function render(){hud();let h='';if(st.step==='intro')h=c('🏢 THE CORPORATION PRESENTA',`<h1>ChronoRift: HUMAN in the LOOP</h1><p>${short('No necesitas experiencia. No necesitas entender todo. No necesitas saber cuánto dura un loop. Solo necesitas estar disponible.','No necesitas experiencia. Solo estar disponible.')}</p><p>La Corporation busca Trainees de Supervisión Operativa para tareas físicas ligeras, corrección de errores y crecimiento personal medible en coins.</p>`,b('APLICAR A TRAINEE','app','primary')+b('OMITIR INTRO','appActive')+b('IR A BUILDER','builderMode'));
if(st.step==='app')h=c('FORMULARIO DE INGRESO',`<p>Nombre de uso dentro del Loop:</p><input id="alias" value="${esc(st.alias)}"><p class="small">Somero Trace no es cuenta ni contraseña. Es una marca para recordar dónde estabas cuando el sistema finja que todo empieza desde cero.</p>`,b('GUARDAR NOMBRE','saveName','primary')+b('USAR HUMAN_01','human01'));
if(st.step==='avatar')h=c('AVATAR TEMPORAL',`<p>${short('La Corporation solo requiere una silueta suficientemente operativa. El resto de ti puede ser recuperado después, si recuerdas dónde lo guardaste.','Elige silueta operativa.')}</p><div class="grid3">${['👤 Trainee','◇ Operador geométrico','◉ Asistente humano'].map(x=>`<button data-a="av:${x}" class="${st.avatar===x?'sel':''}">${x}</button>`).join('')}</div>`,b('CONTINUAR','items','primary'));
if(st.step==='items')h=c('PERSONAL BELONGINGS',`<p>Algunos objetos parecen inútiles durante el trabajo. Eso suele significar que todavía no has llegado a la parte importante.</p><div class="grid2">${Object.keys(item).map(k=>`<div class="item ${st.items[k]?'on':''}"><b>${item[k][0]} ${item[k][1]}</b><p class="small">${item[k][2]}</p><button data-a="it:${k}">${st.items[k]?'QUITAR':'GUARDAR'}</button></div>`).join('')}</div>`,b('GUARDAR TODO','allItems')+b('IR A STUFF BOX','box','primary'));
if(st.step==='box')h=c('📦 STUFF BOX',`<div class="term">Personal Belongings: guardados\nEstado de propiedad: Personal\nAcceso durante turno: limitado por comodidad operativa\nSomero Trace:\n${som()}</div>`,b('REVISAR ÍTEMS','items')+b('CERRAR LOCKER','closeBox','primary'));
if(st.step==='hub')h=c('CUBÍCULO DE TRAINEE',`<p>La Corporation ha preparado herramientas suficientemente útiles para que parezca que elegiste empezar.</p><div class="grid2">${b('📓 Notebook / Somero','book')}${b('💻 Laptop','mail')}${b('◉ Pos.Aya','aya')}${b('🌱 Micropausa','rest')}${b('🧱 Entrenamiento activo','build')}${b('⚠ Review','review')}</div>`,b('IR A BUILDER','build','primary'));
if(st.step==='book'){ach('First_Log','★ First Log');h=c('📓 NOTEBOOK / SOMERO',`<div class="term">Nombre: ${esc(st.alias)}\nRol: HUMAN in the LOOP / Trainee\nStage: Orientation\nEnergía humana: ${st.energy}\nPersonal Belongings: Stuff Box\nSomero Trace:\n${som()}\n\nLa Corporation registra desempeño.\nSomero recuerda contexto.\nNo son lo mismo.</div>`,b('VOLVER','hub','primary')+b('COPIAR SOMERO','copySom'))}
if(st.step==='mail'){ach('First_Order','★ First Order');h=c('💻 LAPTOP',`<div class="term">FROM: Supervisor Local\nSUBJECT: Bienvenido, Trainee\n\nPaso 1: abre Notebook / Somero.\nPaso 2: revisa este correo.\nPaso 3: mantén disponibilidad.\n\nLa disponibilidad es la primera forma de productividad.\n\n---\nFROM: Chief Office\nSUBJECT: Tu oportunidad en la Corporation\n\nCada segundo disponible puede convertirse en valor.\n\n---\nFROM: PR_Worm Service\nSUBJECT: Small productivity reminder\n\nNo es presión. Es continuidad. Si sientes que terminaste, revisa si todavía estás disponible.</div>`,b('VOLVER','hub','primary')+b('ABRIR POS.AYA','aya'))}
if(st.step==='aya'){ach('Gizmo_Handshake','★ Gizmo Handshake');h=c('◉ POS.AYA / WayPoint-O',`<p>Corporate routing assistant online.</p><div class="term">Pos.Aya: "No todo lo guardado queda perdido. Algunas rutas solo esperan permiso."\n\nHint: tus Personal Belongings están en Stuff Box.</div>`,b('GRACIAS','hub')+b('¿RUTAS?','build','primary'))}
if(st.step==='rest')h=c('🌱 MICROPAUSA DISPONIBLE',`<p>No aumenta productividad inmediata. Puede mejorar tu estado.</p><p>La Corporation no penaliza las micropausas. Todavía.</p>`,b('📖 Leer','recover')+b('🌬 Respirar','recover')+b('🧍 Estirar','recover')+b('Seguir trabajando','build','primary'));
if(st.step==='build')h=builder();if(st.step==='done')h=done();$('#s').innerHTML=h;bind();save()}
function builder(){let cells='';for(let y=0;y<H;y++)for(let x=0;x<W;x++)cells+=`<button class="cell ${g[y][x]}" data-a="cell:${x}:${y}">${lab(g[y][x])}</button>`;return `<section class="card"><h2>🧱 Builder mínimo jugable</h2><p>${short('Conecta Intake con Output. Tape repara ▤, Sticks cruza ⬚, Flower recupera energía. PR_Worm optimiza pero adormece.','Conecta I→O. Envía 3 paquetes.')}</p><div class="wrap"><div><div class="board">${cells}</div><p class="small">I Intake · O Output · ■ pared · ▤ rota · ⬚ hueco · ↔ ruta</p></div><div class="tools">${['route:↔ Ruta','tape:▤ Tape','sticks:╱╲ Sticks','flower:🌱 Flower'].map(x=>{let [k,l]=x.split(':');return `<button class="${st.tool===k?'sel':''}" data-a="tool:${k}">${l}</button>`}).join('')}<button class="primary" data-a="send">ENVIAR PAQUETE</button><button data-a="hint">👁️ Supervisor hint</button><button data-a="worm">🪱 PR_Worm optimize</button><button data-a="line">📱 Probar Phone+Chip</button><button data-a="reset">Reset grid</button><div class="term">${status()}</div></div></div></section>`}
function done(){return c('C6B ORIENTATION COMPLETE',`<p>Completaste una vertical slice: identidad, Personal Belongings, Stuff Box, Somero, laptop, Pos.Aya, recovery y builder mínimo.</p><div class="term">${report()}</div>`,b('VOLVER AL BUILDER','build')+b('COPIAR REPORTE','copyRep','primary')+b('ABRIR REVIEW','review'))+reviewCard()}
function reviewCard(){return c('⚠ C6B REVIEW',`<p>Este reporte no cambia el juego automáticamente. Sirve para preparar la siguiente propuesta.</p><textarea id="rv" placeholder="Qué funcionó, qué no, prioridad P0/P1/P2/P3">${esc(st.review)}</textarea>`,b('COPIAR REVIEW','copyReview','primary')+b('VOLVER','hub'))}
function lab(t){return {empty:'',route:'↔',wall:'■',broken:'▤',gap:'⬚',start:'I',out:'O',recovery:'🌱'}[t]||''}function bind(){document.querySelectorAll('[data-a]').forEach(x=>x.onclick=()=>act(x.dataset.a));let a=$('#alias');if(a)a.oninput=e=>st.alias=(e.target.value||'Human_01').slice(0,24);let r=$('#rv');if(r)r.oninput=e=>st.review=e.target.value;document.querySelectorAll('[data-mode]').forEach(x=>x.onclick=()=>mode(x.dataset.mode))}
function act(a){try{if(a==='app')set('app');else if(a==='appActive'){st.mode='active';set('app')}else if(a==='builderMode')mode('builder');else if(a==='saveName'){ach('Somero_Name','★ Somero Name');set('avatar')}else if(a==='human01'){st.alias='Human_01';set('avatar')}else if(a.startsWith('av:')){st.avatar=a.slice(3);ach('Identity_Seed','★ Identity Seed');render()}else if(['items','box','hub','book','mail','aya','rest','build'].includes(a))set(a);else if(a.startsWith('it:')){let k=a.slice(3);st.items[k]=!st.items[k];render()}else if(a==='allItems'){Object.keys(st.items).forEach(k=>st.items[k]=true);badge('Personal_Meaning','◆ Personal Meaning');render()}else if(a==='closeBox'){ach('Stuff_Box_Ready','★ Stuff Box Ready');set('hub')}else if(a==='recover'){st.energy=Math.min(100,st.energy+12);badge('Recovery_Seed','◆ Recovery Seed');set('build')}else if(a.startsWith('tool:')){st.tool=a.slice(5);render()}else if(a.startsWith('cell:')){let[,x,y]=a.split(':');cell(+x,+y)}else if(a==='send')send();else if(a==='hint')toast(path()?'Ruta lista. Envía paquete.':'Conecta I con O. ▤ usa Tape. ⬚ usa Sticks.');else if(a==='worm')worm();else if(a==='line')line();else if(a==='reset'){grid();render()}else if(a==='review'){$('#s').innerHTML=reviewCard();bind()}else if(a==='copySom')copy(som());else if(a==='copyRep')copy(report());else if(a==='copyReview')copy(JSON.stringify({review:st.review,report:JSON.parse(report())},null,2))}catch(e){toast('Error controlado');log('ERR '+e.message);render()}}
function cell(x,y){let t=g[y][x];if(['start','out','wall'].includes(t)){toast('Superficie no editable');return}if(st.tool==='route'&&t==='empty'){g[y][x]='route';st.energy--}else if(st.tool==='tape'&&t==='broken'){g[y][x]='route';st.energy-=2;ach('Tape_Repair','★ Tape Repair')}else if(st.tool==='sticks'&&t==='gap'){g[y][x]='route';st.energy-=3;ach('Bridge_Minimal','★ Bridge Minimal')}else if(st.tool==='flower'&&(t==='empty'||t==='route')){g[y][x]='recovery';st.energy=Math.min(100,st.energy+10);badge('Flower_Not_Productive','◆ Flower ayudó más que produjo')}else toast('Herramienta no aplica aquí');render()}
function pass(t){return ['start','out','route','recovery'].includes(t)}function path(){let q=[[0,2]],seen={'0,2':1};while(q.length){let [x,y]=q.shift();if(x===6&&y===2)return true;for(let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){let nx=x+dx,ny=y+dy,k=nx+','+ny;if(nx>=0&&ny>=0&&nx<W&&ny<H&&!seen[k]&&pass(g[ny][nx])){seen[k]=1;q.push([nx,ny])}}}return false}
function send(){if(!path()){toast('Ruta incompleta');log('SEND_FAIL');return}st.ship++;st.coins+=10;st.energy-=5;ach('Package_Sent','★ Package Sent');log('Paquete enviado '+st.ship);if(st.ship>=3){ach('C6B_Complete','★ C6B Complete');set('done')}else render()}function worm(){st.worm++;st.energy-=12;st.coins+=2;for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(['empty','broken','gap'].includes(g[y][x])){g[y][x]='route';toast('PR_Worm optimizó y habló demasiado');log('PR_Worm boost');if(st.worm>=3)badge('Sleepy_Efficiency','◆ Velocidad con bostezos');return render()}}
function line(){if(st.items.phone&&st.items.chip){badge('Outside_Line_Test','◆ Outside Line');toast('Señal mínima confirmada.')}else toast('Necesitas Phone y Chip/SIM.')}function status(){return `Tool: ${st.tool}\nShipments: ${st.ship}/3\nCoins: ${st.coins}\nEnergy: ${st.energy}\nPR_Worm talks: ${st.worm}\nSomero: ${som()}\n\n${st.log.slice(-7).join('\n')}`}
function report(){return JSON.stringify({build:st.v,status:'ready_for_human_test_not_playable_confirmed',alias:st.alias,mode:st.mode,step:st.step,coins:st.coins,energy:st.energy,shipments:st.ship,items:st.items,achievements:[...st.ach],badges:[...st.badges],somero:som(),log:st.log.slice(-12)},null,2)}function copy(x){navigator.clipboard&&navigator.clipboard.writeText?navigator.clipboard.writeText(x).then(()=>toast('Copiado')).catch(()=>prompt('Copia manual:',x)):prompt('Copia manual:',x)}function save(){try{localStorage.setItem('cr_c6b',JSON.stringify({...st,ach:[...st.ach],badges:[...st.badges]}))}catch(e){}}function load(){try{let x=JSON.parse(localStorage.getItem('cr_c6b')||'null');if(x&&x.v===st.v){Object.assign(st,x);st.ach=new Set(x.ach||[]);st.badges=new Set(x.badges||[])}}catch(e){}}function debug(){let tests=[['grid',g.length===H&&g[0].length===W],['items',Object.keys(item).length===5],['noRemovedName',!document.body.textContent.includes('NOMBRE_SIMBOLICO_REMOVIDO')],['noExternalDeps',!document.querySelector('script[src],link[href^="http"]')],['coreFunctions',typeof render==='function'&&typeof path==='function']];$('#s').innerHTML=c('SelfDebug',`<div class="term">${esc(JSON.stringify(tests,null,2))}</div>`,b('COPIAR REPORTE','copyRep','primary')+b('VOLVER','hub'));bind()}$('#dbg').onclick=debug;$('#copySom').onclick=()=>copy(som());load();render();
})();</script></body></html>
